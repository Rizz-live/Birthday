<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Miriam's Birthday 👑</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pink: #ff2d78;
  --violet: #9b5de5;
  --gold: #f4c430;
  --ice: rgba(255,255,255,0.08);
  --glass: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.15);
  --glass-border-strong: rgba(255,255,255,0.3);
  --text: #fff;
  --text-muted: rgba(255,255,255,0.55);
}

html {
  width: 100%;
  min-height: 100%;
  background: #09000f;
}

body {
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
  background: #09000f;
  font-family: 'DM Sans', sans-serif;
  color: #fff;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  cursor: none;
}

/* ── MESH BG ── */
.mesh {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 15%, rgba(155,93,229,0.55) 0%, transparent 55%),
    radial-gradient(ellipse 60% 80% at 90% 80%, rgba(255,45,120,0.5) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 50% 40%, rgba(244,196,48,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 10%, rgba(100,180,255,0.2) 0%, transparent 50%);
  animation: mesh-drift 18s ease-in-out infinite alternate;
}
@keyframes mesh-drift {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(20deg); }
}

/* ── GRAIN ── */
.grain {
  position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ── STARS CANVAS ── */
#starsCanvas { position: fixed; inset: 0; z-index: 2; }

/* ── CURSOR ── */
#cur {
  position: fixed; width: 10px; height: 10px;
  background: #fff; border-radius: 50%;
  pointer-events: none; z-index: 99999;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 20px rgba(255,255,255,0.8);
  transition: width 0.2s, height 0.2s;
}
#curRing {
  position: fixed; width: 38px; height: 38px;
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 50%;
  pointer-events: none; z-index: 99998;
  transform: translate(-50%,-50%);
  transition: width 0.3s, height 0.3s, border-color 0.3s;
}

/* ── MAIN WRAP ── */
.wrap {
  position: relative; z-index: 5;
  width: 100%;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}

/* ── CARD ── */
.card {
  width: 100%;
  max-width: 1440px;
  display: grid;
  grid-template-columns: 320px 1fr 300px;
  gap: 0;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: 32px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05) inset,
    0 40px 120px rgba(0,0,0,0.7),
    0 0 80px rgba(155,93,229,0.3),
    0 0 140px rgba(255,45,120,0.2);
  position: relative;
  transform-style: preserve-3d;
  will-change: transform;
}

/* inner highlight rim */
.card::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 32px;
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(255,45,120,0.05) 100%);
  pointer-events: none;
  z-index: 0;
}

/* ── VERTICAL DIVIDERS ── */
.divider-v {
  position: absolute; top: 10%; height: 80%; width: 1px;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.15), rgba(155,93,229,0.4), rgba(255,255,255,0.15), transparent);
  z-index: 10;
}
.divider-v.left { left: 320px; }
.divider-v.right { right: 300px; }

/* ── PHOTO PANEL ── */
.photo-panel {
  position: relative; z-index: 5;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 32px;
  background: rgba(155,93,229,0.06);
}

.photo-outer {
  position: relative;
  width: 220px; aspect-ratio: 3/4;
}

/* spinning ring */
.photo-ring {
  position: absolute; inset: -14px;
  border-radius: 28px;
  background: conic-gradient(from 0deg,
    #ff2d78 0%, #9b5de5 30%, #00cfff 55%, #f4c430 75%, #ff2d78 100%
  );
  animation: ring-spin 5s linear infinite;
  z-index: 0;
  filter: blur(3px);
}
@keyframes ring-spin { to { transform: rotate(360deg); } }

.photo-ring-2 {
  position: absolute; inset: -6px;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.2);
  z-index: 1;
}

.photo-img {
  position: relative; z-index: 2;
  width: 100%; height: 100%;
  border-radius: 20px;
  overflow: hidden;
  background: linear-gradient(135deg, rgba(155,93,229,0.3), rgba(255,45,120,0.2));
}
.photo-img img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center top;
  display: block;
  filter: brightness(1.05) contrast(1.1) saturate(1.15);
}
.photo-img.fallback {
  display: flex; align-items: center; justify-content: center;
  font-size: 80px;
}

/* photo glow underneath */
.photo-glow {
  position: absolute;
  bottom: -30px; left: 50%;
  transform: translateX(-50%);
  width: 180px; height: 80px;
  background: radial-gradient(ellipse, rgba(155,93,229,0.7), rgba(255,45,120,0.4), transparent 70%);
  filter: blur(30px);
  animation: glow-breathe 3s ease-in-out infinite;
  z-index: 1;
}
@keyframes glow-breathe {
  0%,100% { opacity: 0.5; transform: translateX(-50%) scaleY(0.8); }
  50% { opacity: 1; transform: translateX(-50%) scaleY(1.4); }
}

/* corner gems */
.gem {
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 50%;
  z-index: 3;
  animation: gem-pulse 2.5s ease-in-out infinite;
}
.gem-1 { top: -5px; left: -5px; background: #9b5de5; box-shadow: 0 0 20px #9b5de5; }
.gem-2 { top: -5px; right: -5px; background: #ff2d78; box-shadow: 0 0 20px #ff2d78; animation-delay: 0.6s; }
.gem-3 { bottom: -5px; left: -5px; background: #00cfff; box-shadow: 0 0 20px #00cfff; animation-delay: 1.2s; }
.gem-4 { bottom: -5px; right: -5px; background: #f4c430; box-shadow: 0 0 20px #f4c430; animation-delay: 1.8s; }
@keyframes gem-pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(2.2); }
}

/* name under photo */
.photo-label {
  margin-top: 28px;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--text-muted);
  position: relative;
  text-align: center;
}
.photo-label::before, .photo-label::after {
  content: '';
  position: absolute; top: 50%;
  width: 24px; height: 1px;
  background: rgba(255,255,255,0.2);
}
.photo-label::before { right: calc(100% + 10px); }
.photo-label::after { left: calc(100% + 10px); }

/* monogram badge */
.monogram {
  margin-top: 16px;
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--glass-border-strong);
  background: var(--glass);
  backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 600;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.8);
}

/* ── CENTER PANEL ── */
.center-panel {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 48px 40px;
  text-align: center;
  position: relative; z-index: 5;
}

/* floating ornaments */
.orn {
  position: absolute;
  font-size: 14px;
  opacity: 0;
  animation: orn-float var(--d,4s) ease-in-out var(--delay,0s) infinite;
  color: rgba(255,255,255,0.2);
}
@keyframes orn-float {
  0% { opacity: 0; transform: translateY(0) scale(0.5); }
  30% { opacity: 1; }
  70% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-80px) scale(1.2); }
}
.orn-1 { top: 15%; left: 8%; --d:3.5s; --delay:0s; }
.orn-2 { top: 20%; right: 8%; --d:4s; --delay:1.2s; }
.orn-3 { bottom: 20%; left: 6%; --d:3.8s; --delay:2.4s; }
.orn-4 { bottom: 15%; right: 6%; --d:4.2s; --delay:0.7s; }

/* eyebrow */
.eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px; letter-spacing: 8px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 20px;
  opacity: 0;
  animation: fade-up 0.8s ease 0.4s forwards;
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* crown */
.crown-wrap {
  font-size: 56px;
  margin-bottom: 12px;
  opacity: 0;
  animation: crown-drop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.5s forwards;
  filter: drop-shadow(0 0 30px rgba(244,196,48,0.8));
}
@keyframes crown-drop {
  from { opacity: 0; transform: translateY(-40px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.crown-wrap span {
  display: inline-block;
  animation: crown-bob 2.5s ease-in-out 1.5s infinite;
}
@keyframes crown-bob {
  0%,100% { transform: translateY(0) rotate(-4deg); }
  50% { transform: translateY(-16px) rotate(4deg); }
}

/* HAPPY BIRTHDAY */
.hb-wrap {
  opacity: 0;
  animation: fade-up 0.8s ease 0.7s forwards;
}
.hb-sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 8px;
}
.hb-happy {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 5.5vw, 72px);
  font-weight: 400;
  font-style: italic;
  color: rgba(255,255,255,0.9);
  line-height: 1;
  letter-spacing: -1px;
}
.hb-birthday {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 5.5vw, 72px);
  font-weight: 900;
  color: #fff;
  line-height: 0.9;
  letter-spacing: -3px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

/* NAME */
.name-wrap {
  margin: 18px 0;
  opacity: 0;
  animation: name-appear 1s cubic-bezier(0.34,1.56,0.64,1) 0.85s forwards;
}
@keyframes name-appear {
  from { opacity: 0; transform: scale(0.7); }
  to { opacity: 1; transform: scale(1); }
}
.name-text {
  font-family: 'Playfair Display', serif;
  font-size: clamp(48px, 8vw, 110px);
  font-weight: 900;
  letter-spacing: -5px;
  text-transform: uppercase;
  line-height: 0.9;
  background: linear-gradient(135deg, #ff2d78 0%, #ff80b0 30%, #9b5de5 60%, #c084fc 80%, #ff2d78 100%);
  background-size: 300% 300%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: name-shimmer 4s ease-in-out infinite;
  filter: drop-shadow(0 8px 30px rgba(255,45,120,0.6));
}
@keyframes name-shimmer {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* RULE */
.rule {
  width: 60%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), rgba(155,93,229,0.5), rgba(255,255,255,0.2), transparent);
  margin: 20px auto;
  opacity: 0;
  animation: fade-up 0.8s ease 1s forwards;
}

/* QUOTE */
.quote {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(13px, 1.8vw, 16px);
  font-style: italic;
  font-weight: 300;
  color: rgba(255,255,255,0.5);
  line-height: 2;
  max-width: 380px;
  opacity: 0;
  animation: fade-up 0.8s ease 1.1s forwards;
  letter-spacing: 0.3px;
}
.quote strong {
  color: rgba(255,255,255,0.85);
  font-weight: 600;
  font-style: normal;
}

/* BADGE */
.badge {
  margin-top: 24px;
  display: inline-flex; align-items: center; gap: 12px;
  padding: 12px 28px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 100px;
  backdrop-filter: blur(20px);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  opacity: 0;
  animation: fade-up 0.8s ease 1.2s forwards;
  transition: all 0.3s;
}
.badge:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.9);
}
.badge-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--pink);
  box-shadow: 0 0 10px var(--pink);
  animation: dot-pulse 2s ease-in-out infinite;
}
@keyframes dot-pulse {
  0%,100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.6); }
}

/* ── INFO PANEL ── */
.info-panel {
  display: flex; flex-direction: column;
  justify-content: center; gap: 16px;
  padding: 40px 32px;
  background: rgba(255,45,120,0.04);
  position: relative; z-index: 5;
}

/* section label */
.panel-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px; letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}

/* glass info card */
.info-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 20px 22px;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
  opacity: 0;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s, border-color 0.4s;
  animation: slide-from-right 0.7s ease both;
}
.info-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.info-card:nth-child(1) { animation-delay: 1.2s; }
.info-card:nth-child(2) { animation-delay: 1.35s; }
.info-card:nth-child(3) { animation-delay: 1.5s; }

@keyframes slide-from-right {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

.info-card:hover {
  transform: translateX(-5px) scale(1.03);
  border-color: rgba(255,255,255,0.25);
  box-shadow: 0 8px 40px rgba(155,93,229,0.3), -4px 0 20px rgba(255,45,120,0.2);
}

.info-ic {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.ic-dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
}
.info-lbl {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px; letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-muted);
}
.info-val {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 700;
  line-height: 1;
  letter-spacing: -0.5px;
}
.info-val.v-violet { color: #c084fc; text-shadow: 0 0 20px rgba(155,93,229,0.6); }
.info-val.v-pink { color: #ff80b0; text-shadow: 0 0 20px rgba(255,45,120,0.6); }
.info-val.v-gold { color: #f4c430; text-shadow: 0 0 20px rgba(244,196,48,0.5); }
.info-val.v-ice { color: #a0e0ff; text-shadow: 0 0 20px rgba(0,207,255,0.5); }

/* panel footer */
.panel-footer {
  margin-top: 8px;
  padding: 16px 0;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-family: 'DM Sans', sans-serif;
  font-size: 9px; letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.2);
  text-align: center;
  opacity: 0;
  animation: fade-up 0.8s ease 1.8s forwards;
}

/* ── PARTICLES ── */
.particle {
  position: fixed; border-radius: 50%;
  pointer-events: none; z-index: 9000;
}
@keyframes burst {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx),var(--ty)) scale(0.2); }
}

/* ── RESPONSIVE ── */
@media (max-width: 1100px) {
  .card { grid-template-columns: 280px 1fr 260px; }
  .divider-v.left { left: 280px; }
  .divider-v.right { right: 260px; }
}
@media (max-width: 900px) {
  .wrap { padding: 14px; }
  .card {
    grid-template-columns: 1fr;
    max-height: none; height: auto;
    border-radius: 24px;
    overflow-y: auto;
  }
  .divider-v { display: none; }
  .photo-panel { padding: 40px 32px 30px; }
  .center-panel { padding: 40px 30px; }
  .info-panel {
    flex-direction: row; flex-wrap: wrap; gap: 12px;
    padding: 30px 24px 40px;
  }
  .panel-label { flex: 1 1 100%; }
  .info-card { flex: 1 1 calc(50% - 6px); }
  .panel-footer { flex: 1 1 100%; }
}
@media (max-width: 520px) {
  .card { padding: 0; }
  .hb-happy, .hb-birthday { font-size: clamp(28px,7vw,48px); }
  .name-text { font-size: clamp(40px,9vw,72px); }
  .info-card { flex: 1 1 100%; }
}
</style>
</head>
<body>

<div class="mesh"></div>
<div class="grain"></div>
<canvas id="starsCanvas"></canvas>
<div id="cur"></div>
<div id="curRing"></div>

<div class="wrap">
<div class="card" id="card">

  <div class="divider-v left"></div>
  <div class="divider-v right"></div>

  <!-- PHOTO -->
  <div class="photo-panel">
    <div class="photo-outer">
      <div class="photo-ring"></div>
      <div class="photo-ring-2"></div>
      <div class="photo-img" id="photoFrame">
        <img src="your-photo.jpg" id="photoImg" alt="Miriam">
      </div>
      <div class="photo-glow"></div>
      <div class="gem gem-1"></div>
      <div class="gem gem-2"></div>
      <div class="gem gem-3"></div>
      <div class="gem gem-4"></div>
    </div>
    <div class="photo-label">Miriam</div>
    <div class="monogram">M</div>
  </div>

  <!-- CENTER -->
  <div class="center-panel">
    <div class="orn orn-1">✦</div>
    <div class="orn orn-2">◆</div>
    <div class="orn orn-3">✧</div>
    <div class="orn orn-4">◇</div>

    <div class="eyebrow">A Celestial Celebration &nbsp;·&nbsp; 2026</div>

    <div class="crown-wrap"><span>👑</span></div>

    <div class="hb-wrap">
      <div class="hb-sub">Wishing you a</div>
      <div class="hb-happy">Happy</div>
      <div class="hb-birthday">Birthday</div>
    </div>

    <div class="name-wrap">
      <div class="name-text">Miriam</div>
    </div>

    <div class="rule"></div>

    <div class="quote">
      May every moment of today be as<br>
      <strong>luminous</strong> as the light you bring<br>
      into this world.
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      You deserve all the magic
      <span class="badge-dot"></span>
    </div>
  </div>

  <!-- INFO -->
  <div class="info-panel">

    <div class="info-card">
      <div class="info-ic">
        <span class="ic-dot" style="background:#c084fc;box-shadow:0 0 10px #9b5de5"></span>
        <span class="info-lbl">Day</span>
      </div>
      <div class="info-val v-violet">Monday</div>
    </div>

    <div class="info-card">
      <div class="info-ic">
        <span class="ic-dot" style="background:#ff80b0;box-shadow:0 0 10px #ff2d78"></span>
        <span class="info-lbl">Date</span>
      </div>
      <div class="info-val v-pink">18 May</div>
    </div>

    <div class="info-card">
      <div class="info-ic">
        <span class="ic-dot" style="background:#a0e0ff;box-shadow:0 0 10px #00cfff"></span>
        <span class="info-lbl">ID</span>
      </div>
      <div class="info-val v-ice" style="font-size:20px;letter-spacing:1px;font-family:'DM Sans',sans-serif;font-weight:500">800161317</div>
    </div>

    <div class="panel-footer">Est. 2026 &nbsp;·&nbsp; With Love</div>

  </div>
</div>
</div>

<script>
// CURSOR
const cur = document.getElementById('cur');
const curRing = document.getElementById('curRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx+'px'; cur.style.top = my+'px';
});
(function loop(){ rx+=(mx-rx)*0.15; ry+=(my-ry)*0.15;
  curRing.style.left=rx+'px'; curRing.style.top=ry+'px';
  requestAnimationFrame(loop);
})();

// STARS
const cv = document.getElementById('starsCanvas');
const ctx = cv.getContext('2d');
let W,H;
function resize(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; }
resize(); window.addEventListener('resize',resize);

const stars = Array.from({length:350},()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.4+0.3,
  base:Math.random()*0.5+0.1,
  phase:Math.random()*Math.PI*2,
  sp:0.0008+Math.random()*0.003,
  col:['255,255,255','244,196,48','155,93,229','0,207,255','255,45,120'][Math.floor(Math.random()*5)]
}));

const meteors=[];
function spawnMeteor(){
  meteors.push({x:Math.random()*W*0.7,y:Math.random()*H*0.3,
    len:100+Math.random()*150, sp:8+Math.random()*8,
    angle:Math.PI/6+Math.random()*0.3, life:1,
    col:['244,196,48','155,93,229','0,207,255','255,45,120'][Math.floor(Math.random()*4)]});
}
setInterval(spawnMeteor,2800);

function draw(t){
  ctx.clearRect(0,0,W,H);
  stars.forEach(s=>{
    const o=s.base*(0.3+0.7*(Math.sin(t*s.sp+s.phase)+1)/2);
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${s.col},${o})`; ctx.fill();
  });
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];
    const a=m.life<0.15?m.life*7:m.life>0.9?(1-m.life)*10:1;
    const g=ctx.createLinearGradient(m.x,m.y,
      m.x-Math.cos(m.angle)*m.len,m.y-Math.sin(m.angle)*m.len);
    g.addColorStop(0,`rgba(${m.col},${a})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.strokeStyle=g; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(m.x,m.y);
    ctx.lineTo(m.x-Math.cos(m.angle)*m.len,m.y-Math.sin(m.angle)*m.len);
    ctx.stroke();
    m.x+=Math.cos(m.angle)*m.sp; m.y+=Math.sin(m.angle)*m.sp;
    m.life-=0.014;
    if(m.life<=0) meteors.splice(i,1);
  }
  requestAnimationFrame(draw);
}
draw(0);

// 3D TILT
const card = document.getElementById('card');
document.addEventListener('mousemove',e=>{
  const r=card.getBoundingClientRect();
  const x=(e.clientX-r.left-r.width/2)/(r.width/2);
  const y=(e.clientY-r.top-r.height/2)/(r.height/2);
  card.style.transform=`perspective(1800px) rotateY(${x*8}deg) rotateX(${-y*6}deg)`;
});
document.addEventListener('mouseleave',()=>{ card.style.transform=''; });

// CLICK PARTICLES
document.addEventListener('click',e=>{
  const cols=['255,45,120','155,93,229','0,207,255','244,196,48','255,128,176'];
  for(let i=0;i<30;i++){
    const p=document.createElement('div');
    p.className='particle';
    const sz=4+Math.random()*12;
    const c=cols[Math.floor(Math.random()*cols.length)];
    const ang=(i/30)*Math.PI*2;
    const d=80+Math.random()*150;
    const dur=0.6+Math.random()*0.5;
    p.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:${sz}px;height:${sz}px;`+
      `background:rgb(${c});box-shadow:0 0 ${sz*3}px rgba(${c},0.8);`+
      `--tx:${Math.cos(ang)*d}px;--ty:${Math.sin(ang)*d}px;`+
      `animation:burst ${dur}s ease-out forwards;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),dur*1000);
  }
});

// IMAGE FALLBACK
const img=document.getElementById('photoImg');
const frame=document.getElementById('photoFrame');
img.addEventListener('error',()=>{
  frame.classList.add('fallback');
  img.style.display='none';
  frame.textContent='🎂';
});
</script>
</body>
</html>
